<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MO'KAAN Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #C9A84C; --gold-light: #E8C96A; --gold-dim: rgba(201,168,76,.25);
      --black: #060606; --card: #111111; --card2: #161616;
      --text: #FFFFFF; --text-muted: rgba(255,255,255,.6);
      --border: rgba(201,168,76,.18); --red: #e05252; --green: #52c07a;
    }
    body {
      background: var(--black); color: var(--text);
      font-family: 'Josefin Sans', sans-serif; font-weight: 300;
      min-height: 100vh; padding: 40px 16px 80px;
    }
    .container { width: 100%; max-width: 660px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 48px; }
    .header-logo { font-size: 11px; letter-spacing: .35em; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
    .header h1 { font-size: 26px; font-weight: 300; letter-spacing: .15em; text-transform: uppercase; }
    .header-sub { font-size: 12px; letter-spacing: .1em; color: var(--text-muted); margin-top: 6px; }

    #login-screen, #cms-screen { display: none; }
    #login-screen.active, #cms-screen.active { display: block; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 36px; margin-bottom: 16px; }

    .field { margin-bottom: 22px; }
    .field label { display: block; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); margin-bottom: 9px; }
    .field input, .field textarea, .field select {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text); font-family: 'Josefin Sans', sans-serif;
      font-size: 14px; font-weight: 300; padding: 12px 14px; outline: none; transition: border-color .2s; resize: vertical;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--gold); }
    .field .hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; letter-spacing: .04em; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--gold); color: #000; border: none; border-radius: 3px;
      padding: 13px 28px; font-family: 'Josefin Sans', sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, transform .1s; width: 100%;
    }
    .btn:hover { background: var(--gold-light); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-sm { padding: 8px 16px; font-size: 10px; width: auto; }
    .btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); width: auto; padding: 10px 20px; }
    .btn-outline:hover { border-color: var(--gold); color: var(--text); background: transparent; }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(224,82,82,.3); width: auto; padding: 7px 14px; font-size: 10px; }
    .btn-danger:hover { background: rgba(224,82,82,.08); border-color: var(--red); }

    .alert { padding: 11px 15px; border-radius: 3px; font-size: 13px; letter-spacing: .04em; margin-bottom: 18px; display: none; }
    .alert.show { display: block; }
    .alert-error   { background: rgba(224,82,82,.1); border: 1px solid rgba(224,82,82,.3); color: var(--red); }
    .alert-success { background: rgba(82,192,122,.1); border: 1px solid rgba(82,192,122,.3); color: var(--green); }

    .section-title {
      font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
      color: var(--gold); margin: 32px 0 18px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-title:first-child { margin-top: 0; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-top: 28px; }

    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 24px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .status-dot.loading { background: var(--gold); animation: pulse 1s ease infinite; }
    .status-dot.error   { background: var(--red); }

    /* ── Events ── */
    #events-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
    .event-entry {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 3px; padding: 20px;
    }
    .event-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .event-entry-num { font-size: 10px; letter-spacing: .2em; color: var(--gold); text-transform: uppercase; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field-row .field { margin-bottom: 0; }
    .add-btn-wrap { margin-top: 14px; }

    /* ── Hours ── */
    .hours-grid { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
    .hours-row-edit {
      display: grid; grid-template-columns: 100px 1fr 1fr 80px;
      align-items: center; gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .hours-row-edit:last-child { border-bottom: none; }
    .hours-row-edit.today-row { background: rgba(201,168,76,.05); }
    .hours-day-label {
      padding: 10px 14px; font-size: 10px; letter-spacing: .15em;
      text-transform: uppercase; color: var(--text-muted);
      border-right: 1px solid var(--border);
    }
    .hours-row-edit.today-row .hours-day-label { color: var(--gold); }
    .hours-time-input {
      background: transparent; border: none; border-right: 1px solid var(--border);
      color: var(--text); font-family: 'Josefin Sans', sans-serif;
      font-size: 13px; padding: 10px 12px; outline: none; width: 100%;
    }
    .hours-time-input:focus { background: rgba(201,168,76,.05); }
    .hours-closed-cell { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 12px; }
    .hours-closed-cell label { font-size: 10px; letter-spacing: .1em; color: var(--text-muted); text-transform: uppercase; cursor: pointer; }
    .hours-closed-cell input[type=checkbox] { accent-color: var(--gold); width: 14px; height: 14px; cursor: pointer; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <p class="header-logo">MO'KAAN</p>
    <h1>Content Manager</h1>
    <p class="header-sub">Texte, Events & Öffnungszeiten</p>
  </div>

  <!-- LOGIN -->
  <div id="login-screen" class="active">
    <div class="card">
      <div id="login-alert" class="alert alert-error">Falsches Passwort.</div>
      <div class="field">
        <label>Passwort</label>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" onclick="doLogin()">Einloggen</button>
    </div>
  </div>

  <!-- CMS -->
  <div id="cms-screen">
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Inhalt geladen</span>
    </div>
    <div id="save-alert" class="alert"></div>
    <div style="margin-bottom:16px;text-align:right">
      <a href="/" target="_blank" style="font-size:11px;letter-spacing:.14em;color:var(--gold);text-decoration:none;border-bottom:1px solid var(--gold-dim);padding-bottom:2px;">Website öffnen →</a>
    </div>

    <div class="card">

      <!-- Sports Screen -->
      <p class="section-title">Sports Screen</p>
      <div class="field">
        <label>Headline (groß im Screen)</label>
        <input type="text" id="f-headline" placeholder="z.B. BARCA VS ATLETICO">
        <p class="hint">Wird groß im Sports-Bildschirm angezeigt.</p>
      </div>
      <div class="field">
        <label>Untertext</label>
        <textarea id="f-subtext" rows="3"></textarea>
      </div>
      <div class="field">
        <label>Badges (eine pro Zeile)</label>
        <textarea id="f-badges" rows="6" placeholder="Bundesliga&#10;Champions League"></textarea>
      </div>

      <!-- Ticker -->
      <p class="section-title">Ticker</p>
      <div class="field">
        <label>Ticker-Einträge (eine pro Zeile)</label>
        <textarea id="f-ticker" rows="6" placeholder="Premium Shisha&#10;Live Bundesliga"></textarea>
      </div>

      <!-- Events -->
      <p class="section-title">Events & Spielplan</p>
      <div id="events-list"></div>
      <div class="add-btn-wrap">
        <button class="btn btn-outline btn-sm" onclick="addEvent()">+ Event hinzufügen</button>
      </div>

      <!-- Opening Hours -->
      <p class="section-title">Öffnungszeiten</p>
      <div class="hours-grid" id="hours-grid"></div>
      <p class="hint" style="margin-top:8px">"Geschlossen" aktivieren für Feiertage oder besondere Tage.</p>

      <div class="row">
        <button class="btn-outline btn" onclick="doLogout()">Logout</button>
        <button class="btn" id="save-btn" onclick="doSave()" style="width:auto;padding:13px 36px;">
          Speichern &amp; Veröffentlichen
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = 'mokaan2026';

  let eventsData = [];
  let hoursData  = [];

  // ── Login ──
  function doLogin() {
    if (document.getElementById('password-input').value === ADMIN_PASSWORD) {
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('cms-screen').classList.add('active');
      loadContent();
    } else {
      document.getElementById('login-alert').classList.add('show');
    }
  }
  document.getElementById('password-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  function doLogout() {
    document.getElementById('cms-screen').classList.remove('active');
    document.getElementById('login-screen').classList.add('active');
    document.getElementById('password-input').value = '';
  }

  // ── Status ──
  function setStatus(s, t) {
    document.getElementById('status-dot').className = 'status-dot' + (s!=='ok'?' '+s:'');
    document.getElementById('status-text').textContent = t;
  }

  // ── Load ──
  function loadContent() {
    setStatus('loading','Lade Inhalt...');
    fetch('/api/content?t='+Date.now())
      .then(r=>r.json())
      .then(data => {
        document.getElementById('f-headline').value = data.sportsHeadline || '';
        document.getElementById('f-subtext').value  = data.sportsSubtext  || '';
        document.getElementById('f-badges').value   = (data.sportsBadges||[]).join('\n');
        document.getElementById('f-ticker').value   = (data.tickerItems  ||[]).join('\n');

        eventsData = data.events || [];
        renderEvents();

        hoursData = data.openingHours || defaultHours();
        renderHours();

        setStatus('ok','Inhalt geladen');
      })
      .catch(() => setStatus('error','Fehler beim Laden'));
  }

  // ── Events ──
  function defaultEvent() { return { title:'', date:'', time:'', text:'', image:'' }; }

  function addEvent() {
    eventsData.push(defaultEvent());
    renderEvents();
  }

  function collectEvents() {
    return Array.from(document.querySelectorAll('.event-entry')).map(e => ({
      title: (e.querySelector('[data-f="title"]')?.value || '').trim(),
      date:  (e.querySelector('[data-f="date"]')?.value  || '').trim(),
      time:  (e.querySelector('[data-f="time"]')?.value  || '').trim(),
      text:  (e.querySelector('[data-f="text"]')?.value  || '').trim(),
      image: (e.querySelector('[data-f="image"]')?.value || '').trim()
    }));
  }

  function removeEvent(i) {
    eventsData = collectEvents();
    eventsData.splice(i, 1);
    renderEvents();
  }

  function renderEvents() {
    const list = document.getElementById('events-list');
    if (!eventsData.length) {
      list.innerHTML = '<p style="font-size:12px;color:var(--text-muted);letter-spacing:.1em;padding:8px 0;">Keine Events. Klick "+ Event hinzufügen".</p>';
      return;
    }
    list.innerHTML = eventsData.map((ev,i) => `
      <div class="event-entry">
        <div class="event-entry-header">
          <span class="event-entry-num">Event ${i+1}</span>
          <button class="btn btn-danger" onclick="removeEvent(${i})">Löschen</button>
        </div>
        <div class="field">
          <label>Titel</label>
          <input type="text" data-f="title" placeholder="Barca vs Atletico" value="${esc(ev.title)}">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Datum</label>
            <input type="date" data-f="date" value="${esc(ev.date)}" style="color-scheme:dark">
          </div>
          <div class="field">
            <label>Uhrzeit</label>
            <input type="time" data-f="time" value="${esc(ev.time||'')}" style="color-scheme:dark">
          </div>
        </div>
        <div class="field" style="margin-top:12px">
          <label>Beschreibung</label>
          <textarea data-f="text" rows="2" placeholder="Kurzer Text zum Event...">${esc(ev.text)}</textarea>
        </div>
        <div class="field">
          <label>Bild-URL (optional)</label>
          <input type="url" data-f="image" placeholder="https://..." value="${esc(ev.image)}">
          <p class="hint">Direktlink zu einem Bild. Leer lassen für Platzhalter.</p>
        </div>
      </div>`).join('');
  }

  // ── Opening Hours ──
  function defaultHours() {
    return [
      {day:'Montag',    open:'12:00',close:'01:00',closed:false},
      {day:'Dienstag',  open:'12:00',close:'01:00',closed:false},
      {day:'Mittwoch',  open:'12:00',close:'01:00',closed:false},
      {day:'Donnerstag',open:'12:00',close:'01:00',closed:false},
      {day:'Freitag',   open:'12:00',close:'03:00',closed:false},
      {day:'Samstag',   open:'12:00',close:'03:00',closed:false},
      {day:'Sonntag',   open:'12:00',close:'01:00',closed:false}
    ];
  }

  function renderHours() {
    const berlinNow = new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Berlin'}));
    const jsDay = berlinNow.getDay();
    const todayIdx = jsDay===0?6:jsDay-1;

    document.getElementById('hours-grid').innerHTML = hoursData.map((h,i) => `
      <div class="hours-row-edit${i===todayIdx?' today-row':''}">
        <span class="hours-day-label">${h.day}</span>
        <input class="hours-time-input" type="text" placeholder="12:00" value="${esc(h.open)}"
               oninput="hoursData[${i}].open=this.value" title="Öffnet" ${h.closed?'disabled':''}>
        <input class="hours-time-input" type="text" placeholder="01:00" value="${esc(h.close)}"
               oninput="hoursData[${i}].close=this.value" title="Schließt" ${h.closed?'disabled':''}>
        <div class="hours-closed-cell">
          <input type="checkbox" id="cl-${i}" ${h.closed?'checked':''} onchange="toggleClosed(${i},this.checked)">
          <label for="cl-${i}">Zu</label>
        </div>
      </div>`).join('');
  }

  function toggleClosed(i, val) {
    hoursData[i].closed = val;
    renderHours();
  }

  // ── Save ──
  function doSave() {
    const content = {
      sportsHeadline: document.getElementById('f-headline').value.trim(),
      sportsSubtext:  document.getElementById('f-subtext').value.trim(),
      sportsBadges:   document.getElementById('f-badges').value.split('\n').map(s=>s.trim()).filter(Boolean),
      tickerItems:    document.getElementById('f-ticker').value.split('\n').map(s=>s.trim()).filter(Boolean),
      events:         collectEvents(),
      openingHours:   hoursData
    };

    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Wird gespeichert...';
    setStatus('loading', 'Speichern...');

    fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: ADMIN_PASSWORD, content })
    })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          startReloadCountdown();
        } else {
          throw new Error(data.error || 'Unbekannter Fehler');
        }
      })
      .catch(err => {
        setStatus('error', 'Fehler');
        showAlert('Fehler: ' + err.message, 'error');
      })
      .finally(() => { btn.disabled = false; btn.textContent = 'Speichern & Veröffentlichen'; });
  }

  function startReloadCountdown() {
    setStatus('loading', 'Speichern...');
    setTimeout(() => {
      loadContent();
      setStatus('ok', 'Gespeichert & live');
      showAlert('Gespeichert! Änderungen sind sofort live.', 'success');
    }, 800);
  }

  function showAlert(msg,type) {
    const el = document.getElementById('save-alert');
    el.textContent=msg; el.className=`alert alert-${type} show`;
    setTimeout(()=>el.classList.remove('show'),6000);
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
</script>
</body>
</html>
